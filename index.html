<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verbtafel · 856 deutsche Verben</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #000000;
    --panel1: #0D0D0D;
    --panel2: #141414;
    --amber: #F5A623;
    --amber-dim: #8C6118;
    --amber-soft: rgba(245,166,35,0.14);
    --white: #EDEBE3;
    --grey: #75777D;
    --grey-dim: #46484D;
    --ok: #4CAF6D;
    --ok-soft: rgba(76,175,109,0.14);
    --bad: #D9544E;
    --bad-soft: rgba(217,84,78,0.14);
    --line: rgba(255,255,255,0.12);
    --shadow: 0 10px 30px rgba(0,0,0,0.8);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background: var(--bg);
    color:var(--white);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    padding-bottom:40px;
  }
  .wrap{max-width:720px; margin:0 auto; padding:22px 16px 60px;}

  header.top{ text-align:center; margin-bottom:16px; }
  .eyebrow{
    font-family:'Space Mono', monospace;
    font-size:11px;
    letter-spacing:0.2em;
    text-transform:uppercase;
    color: var(--amber);
  }
  h1{
    font-family:'Space Mono', monospace;
    font-weight:700;
    font-size: clamp(26px, 7vw, 36px);
    margin:6px 0 2px;
    letter-spacing:0.01em;
    text-transform: uppercase;
  }
  .sub{ color:var(--grey); font-size:13.5px; font-family:'Inter'; }
  .sub::before{ content:'— '; color: var(--grey-dim); }

  .sticky-nav{
    position: sticky;
    top: 0;
    z-index: 30;
    background: var(--bg);
    margin: 0 -16px 14px;
    padding: 10px 16px 0;
    border-bottom: 1px solid var(--line);
  }
  nav.tabs{
    display:flex; gap:2px; margin:0 0 10px;
    background: var(--panel1);
    border-radius:10px;
    padding:4px;
  }
  nav.tabs button{
    flex:1;
    font-family:'Space Mono', monospace;
    font-size:11.5px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    padding:10px 6px;
    background:transparent;
    border:none;
    border-radius:7px;
    color: var(--grey);
    cursor:pointer;
    transition: all .15s ease;
  }
  nav.tabs button.active{ background: var(--panel2); color: var(--amber); }

  .controls{ display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:14px; }
  .chip-group{ display:flex; gap:6px; }
  .chip{
    font-family:'Space Mono', monospace;
    font-size:11px;
    padding:6px 12px;
    border-radius:20px;
    border:1px solid var(--line);
    background: var(--panel1);
    color: var(--grey);
    cursor:pointer;
  }
  .chip.active{ background: var(--amber-soft); border-color: var(--amber-dim); color: var(--amber); }

  input#searchBox{
    font-family:'Space Mono', monospace;
    font-size:12px;
    padding:7px 10px;
    border-radius:6px;
    border:1px solid var(--line);
    background: var(--panel1);
    color: var(--white);
  }
  input#searchBox{ flex:1; min-width:140px; }
  input#searchBox::placeholder{ color: var(--grey-dim); }

  .progress-line{
    font-family:'Space Mono', monospace;
    font-size:11px;
    color: var(--grey);
    margin-bottom:14px;
  }
  .progress-track{ height:4px; background: var(--panel1); border-radius:3px; margin-top:5px; overflow:hidden; }
  .progress-fill{ height:100%; background: var(--amber); width:0%; transition:width .25s ease; }

  /* Flashcard — departure-board panel */
  .card-stage{ display:flex; flex-direction:column; align-items:center; padding:8px 0 6px; }
  .index-card{
    width:100%; max-width:440px; min-height:250px;
    background: var(--panel1);
    border-radius:10px;
    box-shadow: var(--shadow);
    position:relative;
    padding:20px 20px 18px;
    cursor:pointer;
    border:1px solid var(--line);
  }
  .card-top-row{ display:flex; justify-content:space-between; align-items:center; margin-bottom:22px; }
  .catalog-no{ font-family:'Space Mono', monospace; font-size:11px; color: var(--grey); }
  .level-badge{
    font-family:'Space Mono', monospace; font-size:10px; letter-spacing:0.05em;
    padding:3px 9px; border-radius:3px; border:1px solid var(--amber-dim); color:var(--amber);
  }

  .flap-row{ display:flex; justify-content:center; flex-wrap:wrap; gap:4px; margin: 26px 0 10px; }
  .flap-cell{
    position:relative;
    background: var(--panel2);
    border-radius:4px;
    min-width:24px;
    height:44px;
    display:flex; align-items:center; justify-content:center;
    font-family:'Space Mono', monospace;
    font-weight:700;
    font-size:22px;
    color: var(--amber);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), inset 0 -1px 0 rgba(0,0,0,0.4);
    overflow:hidden;
  }
  .flap-cell::after{
    content:''; position:absolute; top:50%; left:0; right:0; height:1px;
    background: rgba(0,0,0,0.55);
  }
  .flap-cell.space{ background:transparent; box-shadow:none; min-width:12px; }

  .flip-hint{ text-align:center; font-size:11px; color:var(--grey); font-family:'Space Mono', monospace; letter-spacing:0.04em; margin-top:14px;}
  .meaning{
    font-family:'Space Mono', monospace; font-weight:700; font-size:19px;
    text-align:center; margin: 30px 0 16px; color: var(--amber);
  }
  .example-de, .example-en{
    border-top:1px solid var(--line); padding-top:9px; margin-top:9px; font-size:14px; line-height:1.55;
  }
  .example-de{ color: var(--white); }
  .example-en{ color: var(--grey); }

  .card-actions{ display:flex; gap:10px; margin-top:16px; width:100%; max-width:440px; }
  .card-actions button{
    flex:1; padding:12px 8px; border-radius:8px; border:1px solid var(--line);
    background: var(--panel1); font-family:'Inter'; font-weight:600; font-size:13.5px; color:var(--white); cursor:pointer;
  }
  .btn-practice{ color: var(--bad); border-color: var(--bad); background: var(--bad-soft); }
  .btn-know{ color: var(--bg); background: var(--ok); border-color: var(--ok); font-weight:700; }

  .nav-row{ display:flex; justify-content:space-between; align-items:center; width:100%; max-width:440px; margin-top:14px; }
  .nav-row button{ background:none; border:none; font-family:'Space Mono', monospace; font-size:11.5px; color:var(--grey); cursor:pointer; padding:6px 10px; }
  .nav-row button:hover{ color: var(--amber); }
  .card-counter{ font-family:'Space Mono', monospace; font-size:11.5px; color: var(--grey); }

  /* Quiz */
  .quiz-box{ background: var(--panel1); border:1px solid var(--line); border-radius:10px; box-shadow: var(--shadow); padding:22px; max-width:460px; margin:0 auto; }
  .quiz-score{ font-family:'Space Mono', monospace; font-size:11.5px; color: var(--grey); text-align:center; margin-bottom:10px; }
  .quiz-prompt{ text-align:center; margin-bottom:20px; }
  .quiz-prompt .label{ font-size:11px; color: var(--grey); font-family:'Space Mono', monospace; text-transform:uppercase; letter-spacing:0.08em; }
  .quiz-options{ display:flex; flex-direction:column; gap:9px; }
  .quiz-options button{
    text-align:left; padding:12px 14px; border-radius:8px; border:1px solid var(--line);
    background: var(--panel2); font-family:'Inter'; font-size:14px; color:var(--white); cursor:pointer;
  }
  .quiz-options button.correct{ border-color: var(--ok); background: var(--ok-soft); color: var(--ok); }
  .quiz-options button.wrong{ border-color: var(--bad); background: var(--bad-soft); color: var(--bad); }
  .quiz-next{
    display:block; margin:16px auto 0; padding:10px 22px; border-radius:8px; border:none;
    background: var(--amber); color:#1A1200; font-family:'Space Mono', monospace; font-weight:700; cursor:pointer;
  }

  /* Catalog */
  .catalog-list{ display:flex; flex-direction:column; }
  .catalog-row{ display:flex; align-items:baseline; gap:10px; padding:10px 6px; border-bottom:1px solid var(--line); font-size:13.5px; }
  .catalog-row .cno{ font-family:'Space Mono', monospace; font-size:10.5px; color: var(--grey); width:26px; flex-shrink:0; }
  .catalog-row .cverb{ font-family:'Space Mono', monospace; font-weight:700; color: var(--amber); width:126px; flex-shrink:0; }
  .catalog-row .cmeaning{ color: var(--grey); flex:1; }
  .catalog-row .known-dot{ width:7px; height:7px; border-radius:50%; background: var(--grey-dim); flex-shrink:0; }
  .catalog-row .known-dot.on{ background: var(--ok); }

  .empty-state{ text-align:center; color: var(--grey); padding:30px 10px; font-family:'Space Mono', monospace; font-size:13px; }

  footer.credit{ text-align:center; margin-top:36px; font-family:'Space Mono', monospace; font-size:10px; color: var(--grey-dim); }

  @media (max-width:420px){
    .catalog-row .cverb{ width:96px; font-size:12.5px; }
    .catalog-row .cmeaning{ font-size:12px; }
    .flap-cell{ min-width:20px; height:38px; font-size:18px; }
  }
</style>
</head>

<div class="wrap">
  <header class="top">
    <div class="eyebrow">Anzeigetafel · 856 Verben</div>
    <h1>Verbtafel</h1>
    <div class="sub">Deutsche Verben · A1–B2</div>

      <input type="text" id="searchBox" placeholder="Suchen…" style="display:none;">

  <div class="progress-line" id="progressLine"></div>

  <main id="mainArea"></main>

  <footer class="credit">Fortschritt wird lokal gespeichert · A1–A2 &amp; B1–B2 Verbenlisten</footer>
</div>

ime."}, {"no": 825, "verb": "verbergen", "level": "B2", "en": "to hide / conceal", "de_ex": "Hinter der einfachen Oberfläche verbirgt sich ein komplexes System.", "en_ex": "A complex system is hidden behind the simple interface."}, {"no": 826, "verb": "verdoppeln", "level": "B2", "en": "to double", "de_ex": "Das Unternehmen möchte seine Produktionskapazität bis 2030 verdoppeln.", "en_ex": "The company wants to double its production capacity by 2030."}, {"no": 827, "verb": "verhindern", "level": "B2", "en": "to prevent", "de_ex": "Regelmäßige Wartung kann viele technische Ausfälle verhindern.", "en_ex": "Regular maintenance can prevent many technical failures."}, {"no": 828, "verb": "verknüpfen (mit + D.)", "level": "B2", "en": "to link / connect", "de_ex": "Das System verknüpft Produktionsdaten mit Qualitätskennzahlen.", "en_ex": "The system links production data with quality indicators."}, {"no": 829, "verb": "vernachlässigen", "level": "B2", "en": "to neglect", "de_ex": "Unter Zeitdruck werden langfristige Aufgaben oft vernachlässigt.", "en_ex": "Long-term tasks are often neglected under time pressure."}, {"no": 830, "verb": "vermerken", "level": "B2", "en": "to note / record", "de_ex": "Bitte vermerken Sie jede Abweichung direkt im Prüfprotokoll.", "en_ex": "Please record every deviation directly in the test report."}, {"no": 831, "verb": "verschärfen", "level": "B2", "en": "to tighten / worsen", "de_ex": "Die Behörde hat die Anforderungen an den Brandschutz verschärft.", "en_ex": "The authority tightened the fire-safety requirements."}, {"no": 832, "verb": "verschlechtern", "level": "B2", "en": "to worsen", "de_ex": "Eine zu hohe Temperatur kann die Materialeigenschaften verschlechtern.", "en_ex": "An excessively high temperature can worsen the material properties."}, {"no": 833, "verb": "verstärken", "level": "B2", "en": "to strengthen / intensify", "de_ex": "Zusätzliche Rippen können die Stabilität des Bauteils verstärken.", "en_ex": "Additional ribs can increase the stability of the component."}, {"no": 834, "verb": "verteilen", "level": "B2", "en": "to distribute", "de_ex": "Die Aufgaben wurden gleichmäßig auf alle Teammitglieder verteilt.", "en_ex": "The tasks were distributed evenly among all team members."}, {"no": 835, "verb": "vertrauen (auf + A. / + D.)", "level": "B2", "en": "to trust / rely on", "de_ex": "Bei wichtigen Entscheidungen vertraue ich auf überprüfbare Daten.", "en_ex": "For important decisions, I rely on verifiable data."}, {"no": 836, "verb": "verwalten", "level": "B2", "en": "to manage / administer", "de_ex": "Die Plattform verwaltet alle Dokumente an einem zentralen Ort.", "en_ex": "The platform manages all documents in one central location."}, {"no": 837, "verb": "verzeichnen", "level": "B2", "en": "to record / register", "de_ex": "Das Unternehmen verzeichnete im letzten Jahr ein starkes Wachstum.", "en_ex": "The company recorded strong growth last year."}, {"no": 838, "verb": "verzögern", "level": "B2", "en": "to delay", "de_ex": "Fehlende Genehmigungen könnten den Projektstart erheblich verzögern.", "en_ex": "Missing approvals could significantly delay the project start."}, {"no": 839, "verb": "vorliegen", "level": "B2", "en": "to be available / exist", "de_ex": "Die endgültigen Prüfergebnisse liegen noch nicht vor.", "en_ex": "The final test results are not yet available."}, {"no": 840, "verb": "vornehmen", "level": "B2", "en": "to carry out / undertake", "de_ex": "Vor dem nächsten Versuch nehmen wir einige Änderungen an der Anlage vor.", "en_ex": "Before the next experiment, we will make several changes to the system."}, {"no": 841, "verb": "vorsehen", "level": "B2", "en": "to provide for / plan", "de_ex": "Der aktuelle Zeitplan sieht zwei zusätzliche Testtage vor.", "en_ex": "The current schedule provides for two additional test days."}, {"no": 842, "verb": "vorwerfen (+ D.)", "level": "B2", "en": "to accuse / reproach", "de_ex": "Die Opposition wirft der Regierung mangelnde Transparenz vor .)", "level": "B2", "en": "to fall back on / use", "de_ex": "Bei Bedarf können wir auf frühere Versuchsdaten zurückgreifen.", "en_ex": "If necessary, we can use data from previous experiments."}, {"no": 852, "verb": "zurückweisen", "level": "B2", "en": "to reject / dismiss", "de_ex": "Das Gericht wies die Beschwerde als unbegründet zurück.", "en_ex": "The court rejected the complaint as unfounded."}, {"no": 853, "verb": "zusammenhängen (mit + D.)", "level": "B2", "en": "to be connected with", "de_ex": "Die Schwankungen hängen vermutlich mit der Umgebungstemperatur zusammen.", "en_ex": "The fluctuations are probably connected with the ambient temperature."}, {"no": 854, "verb": "zusichern", "level": "B2", "en": "to assure / guarantee", "de_ex": "Der Lieferant hat uns eine Lieferung bis Freitag zugesichert.", "en_ex": "The supplier assured us that delivery would take place by Friday."}, {"no": 855, "verb": "zuteilen", "level": "B2", "en": "to allocate / assign", "de_ex": "Die verfügbaren Mittel werden nach festen Kriterien zugeteilt.", "en_ex": "The available funds are allocated according to fixed criteria."}, {"no": 856, "verb": "zweifeln (an + D.)", "level": "B2", "en": "to doubt", "de_ex": "Nach den widersprüchlichen Ergebnissen zweifelte das Team an der Methode.", "en_ex": "After the contradictory results, the team doubted the method."}]</script>
<script>
const ALL_VERBS = JSON.parse(document.getElementById('verb-data').textContent);

let state = {
  mode: 'flash', level: 'all',
  deck: [], deckPos: 0,
  quizPool: [], quizIndex: 0, quizScore: 0, quizAnswered: false,
  search: ''
};
let progress = {};

async function loadProgress(){
  try{ const res = await window.storage.get('verb-progress'); if(res && res.value){ progress = JSON.parse(res.value); } }
  catch(e){}
}
async function saveProgress(){
  try{ await window.storage.set('verb-progress', JSON.stringify(progress)); } catch(e){}
}

function filteredByLevel(list){ return state.level==='all' ? list : list.filter(v=>v.level===state.level); }
function currentFlashList(){ return filteredByLevel(ALL_VERBS); }

function shuffleArr(arr){
  const a = [...arr];
  for(let i=a.length-1; i>0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function buildDeck(){
  state.deck = shuffleArr(currentFlashList());
  state.deckPos = 0;
}
function nextCard(){
  state.deckPos++;
  if(state.deckPos >= state.deck.length) buildDeck();
  render();
}

function pickDistractors(correct, pool, n){
  const others = pool.filter(v=>v.no!==correct.no);
  return others.sort(()=>Math.random()-0.5).slice(0,n);
}

function startQuiz(){
  const pool = currentFlashList();
  state.quizPool = pool.length >= 2 ? [...pool].sort(()=>Math.random()-0.5) : [];
  state.quizIndex=0; state.quizScore=0; state.quizAnswered=false;
  render();
}

function renderControls(){
  document.getElementById('searchBox').style.display = state.mode==='catalog' ? '' : 'none';
}
function renderProgressLine(){
  const el = document.getElementById('progressLine');
  if(state.mode==='catalog'){ el.innerHTML=''; return; }
  const list = currentFlashList();
  const known = list.filter(v=>progress[v.no]).length;
  const pct = list.length ? Math.round((known/list.length)*100) : 0;
  const label = state.level==='all' ? 'Alle Level' : state.level;
  el.innerHTML = `${label} · ${known}/${list.length} gewusst
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>`;
}

function flapMarkup(word){
  return word.toUpperCase().split('').map(ch =>
    ch === ' '
      ? `<span class="flap-cell space"></span>`
      : `<span class="flap-cell">${ch}</span>`
  ).join('');
}

function renderFlash(){
  if(state.deck.length===0) buildDeck();
  const main = document.getElementById('mainArea');
  if(state.deck.length===0){
    main.innerHTML = `<div class="empty-state">Keine Verben in dieser Kombination aus Gruppe &amp; Level.</div>`;
    return;
  }
  if(state.deckPos >= state.deck.length) state.deckPos = 0;
  const v = state.deck[state.deckPos];
  const known = !!progress[v.no];

  main.innerHTML = `
    <div class="card-stage">
      <div class="index-card" id="flipCard">
        <div class="card-top-row">
          <span class="catalog-no">Nr. ${String(v.no).padStart(3,'0')}</span>
          <span class="level-badge">${v.level}</span>
        </div>
        <div class="flap-row">${flapMarkup(v.verb)}</div>
        <div class="meaning">${v.en}</div>
        <div class="example-de">${v.de_ex}</div>
        <div class="example-en">${v.en_ex}</div>
        <div class="flip-hint">${known ? '✓ GEWUSST — ' : ''}TIPPEN FÜR NEUES WORT</div>
      </div>
      <div class="card-actions">
        <button class="btn-practice" id="btnPractice">Nochmal üben</button>
        <button class="btn-know" id="btnKnow">Weiß ich ✓</button>
      </div>
      <div class="nav-row">
        <span class="card-counter">Karte ${state.deckPos+1} / ${state.deck.length}</span>
      </div>
    </div>
  `;
  document.getElementById('flipCard').onclick = () => { nextCard(); };
  document.getElementById('btnPractice').onclick = (e) => { e.stopPropagation(); progress[v.no]=false; saveProgress(); nextCard(); };
  document.getElementById('btnKnow').onclick = (e) => { e.stopPropagation(); progress[v.no]=true; saveProgress(); nextCard(); };
}

function renderQuiz(){
  const main = document.getElementById('mainArea');
  if(state.quizPool.length < 2){
    main.innerHTML = `<div class="empty-state">Diese Gruppe braucht mindestens 2 Verben fürs Quiz. Wähle eine andere Gruppe oder Level "Alle".</div>`;
    return;
  }
  if(state.quizIndex >= state.quizPool.length){
    main.innerHTML = `
      <div class="quiz-box" style="text-align:center;">
        <div class="meaning" style="margin-top:0;">FERTIG</div>
        <p style="color:var(--grey);">Du hast ${state.quizScore} von ${state.quizPool.length} richtig.</p>
        <button class="quiz-next" id="btnRestartQuiz">Nochmal</button>
      </div>`;
    document.getElementById('btnRestartQuiz').onclick = startQuiz;
    return;
  }
  const v = state.quizPool[state.quizIndex];
  const sameLevelPool = ALL_VERBS.filter(x => x.level === v.level);
  const distractPool = sameLevelPool.length >= 4 ? sameLevelPool : ALL_VERBS;
  const distractors = pickDistractors(v, distractPool, 3);
  const options = [v, ...distractors].sort(()=>Math.random()-0.5);

  main.innerHTML = `
    <div class="quiz-box">
      <div class="quiz-score">PUNKTE ${state.quizScore} · FRAGE ${state.quizIndex+1}/${state.quizPool.length}</div>
      <div class="quiz-prompt">
        <div class="label">Was bedeutet…</div>
        <div class="flap-row" style="margin-top:12px;">${flapMarkup(v.verb)}</div>
      </div>
      <div class="quiz-options">
        ${options.map(o => `<button data-no="${o.no}">${o.en}</button>`).join('')}
      </div>
    </div>
  `;
  main.querySelectorAll('.quiz-options button').forEach(btn => {
    btn.onclick = () => {
      if(state.quizAnswered) return;
      state.quizAnswered = true;
      const chosenNo = parseInt(btn.dataset.no);
      const correct = chosenNo === v.no;
      if(correct) state.quizScore++;
      progress[v.no] = correct; saveProgress();
      main.querySelectorAll('.quiz-options button').forEach(b => {
        const bNo = parseInt(b.dataset.no);
        if(bNo===v.no) b.classList.add('correct');
        else if(bNo===chosenNo) b.classList.add('wrong');
        b.disabled = true;
      });
      const nextBtn = document.createElement('button');
      nextBtn.className = 'quiz-next';
      nextBtn.textContent = state.quizIndex+1 < state.quizPool.length ? 'Weiter →' : 'Ergebnis anzeigen';
      nextBtn.onclick = () => { state.quizIndex++; state.quizAnswered=false; render(); };
      document.querySelector('.quiz-box').appendChild(nextBtn);
    };
  });
}

function renderCatalog(){
  const main = document.getElementById('mainArea');
  let list = filteredByLevel(ALL_VERBS);
  if(state.search.trim()){
    const q = state.search.trim().toLowerCase();
    list = list.filter(v => v.verb.toLowerCase().includes(q) || v.en.toLowerCase().includes(q) || v.de_ex.toLowerCase().includes(q));
  }
  if(list.length===0){ main.innerHTML = `<div class="empty-state">Keine Treffer.</div>`; return; }
  main.innerHTML = `<div class="catalog-list">${list.map(v => `
    <div class="catalog-row">
      <span class="cno">${String(v.no).padStart(3,'0')}</span>
      <span class="known-dot ${progress[v.no] ? 'on':''}"></span>
      <span class="cverb">${v.verb}</span>
      <span class="cmeaning">${v.en} <span style="color:var(--amber); opacity:0.7;">· ${v.level}</span></span>
    </div>
  `).join('')}</div>`;
}

function render(){
  renderControls();
  renderProgressLine();
  document.querySelectorAll('nav.tabs button').forEach(b => b.classList.toggle('active', b.dataset.mode===state.mode));
  document.querySelectorAll('#levelChips .chip').forEach(c => c.classList.toggle('active', c.dataset.level===state.level));
  if(state.mode==='flash') renderFlash();
  else if(state.mode==='quiz') renderQuiz();
  else renderCatalog();
}

document.querySelectorAll('nav.tabs button').forEach(btn => {
  btn.onclick = () => { state.mode = btn.dataset.mode; if(state.mode==='quiz') startQuiz(); render(); };
});
document.querySelectorAll('#levelChips .chip').forEach(chip => {
  chip.onclick = () => { state.level = chip.dataset.level; buildDeck(); if(state.mode==='quiz') startQuiz(); else render(); };
});
document.getElementById('searchBox').oninput = (e) => { state.search = e.target.value; render(); };

(async function init(){
  await loadProgress();
  render();
})();
</script>
</body>
</html>
